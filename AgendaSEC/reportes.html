<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reportes SEC</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo-box">
            <img src="img/logo.png">
            <h2>Agenda SEC</h2>
        </div>

        <ul class="menu">

            <li onclick="window.location.href='index.html'">
                <i class="fas fa-house"></i>
                Dashboard
            </li>

            <li class="active">
                <i class="fas fa-chart-column"></i>
                Reportes
            </li>

        </ul>

    </aside>

    <main class="main-content">

        <div class="topbar">
            <h1>📊 Reportes Financieros</h1>
        </div>

        <div class="cards">

            <div class="card">
                <h3>Ventas Totales</h3>
                <span id="ventasTotales">$0</span>
            </div>

            <div class="card">
                <h3>Ganancia SEC</h3>
                <span id="gananciaSEC">$0</span>
            </div>

            <div class="card">
                <h3>Pago Técnicos</h3>
                <span id="pagoTecnicos">$0</span>
            </div>

        </div>

        <div class="tabla-section">

            <h2>Detalle por Técnico</h2>

            <table>

                <thead>

                    <tr>
                        <th>Técnico</th>
                        <th>Facturación</th>
                        <th>Pago Técnico</th>
                        <th>Ganancia SEC</th>
                    </tr>

                </thead>

                <tbody id="tablaReportes">

                </tbody>

            </table>

        </div>

    </main>

</div>

<script src="js/reportes.js"></script>

</body>
</html>
